
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            color: #333;
        }

        header {
            background: #222;
            color: white;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        header nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
        }

        header nav a:hover {
            color: #00bcd4;
        }

        /* Category Navigation */
        .nav-scroller {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 12px 10%;
            overflow-x: auto;
        }

        .category-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .category-menu a {
            text-decoration: none;
            color: #555;
            padding: 8px 14px;
            border-radius: 20px;
            transition: 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .category-menu a:hover {
            background: #00bcd4;
            color: white;
        }

        .hero {
            text-align: center;
            padding: 100px 10%;
            background: linear-gradient(135deg, #00bcd4, #3f51b5);
            color: white;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background: white;
            color: #3f51b5;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: 50px auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .posts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            color: #666;
            margin-bottom: 15px;
        }

        .read-more {
            text-decoration: none;
            color: #00bcd4;
            font-weight: bold;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            header nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }

            header nav a {
                margin: 5px 10px;
            }

            .container {
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">MyBlog</div>

        <nav>
            <a href="/">Home</a>
            <a href="#">Blogs</a>
            <a href="#">Categories</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Categories Navigation -->
    <div class="nav-scroller">
        <nav class="category-menu">
            {% for cat in categories %}
                <a href="{% url 'posts_by_category' cat.id %}">
                    {{ cat.category_name }}
                </a>
            {% endfor %}
        </nav>
    </div>

    {% block content %}

    
    {% endblock %}

    <footer>
        <p>&copy; 2026 MyBlog. All Rights Reserved.</p>
    </footer>

</body>

</html>
