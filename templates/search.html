{% extends 'base.html' %}

{% block content %} 

    <div class="search-results">

        <h2>Search Results for "{{ keyword }}"</h2>

        {% if posts %}

            <ul>

                {% for post in posts %}

                    <li>

                        <a href="{% url 'blog_detail' post.slug %}">{{ post.title }}</a>

                        <p>{{ post.short_description }}</p>

                    </li>

                {% endfor %}

            </ul>

        {% else %}

            <p>No results found.</p>

        {% endif %}

    </div>  

{% endblock %}
